<!DOCTYPE html>
<html lang="en">
<head><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
        body{
            background-image: url('/static/wall.jpg');
        }

        @keyframes spin {
    0%{
        transform: rotate(0deg);
    }
    100%{
        transform: rotate(360deg);
    }
}

.spin{
    animation: spin 2s linear infinite
}
        
.pixel{
    image-rendering: crisp-edges;
}

    </style>
</head>
<body>
    <p style="position: absolute; right: 25px; top: -11px; font-family: Bitcount Prop Single; font-size: 40px; color: rgba(0, 0, 0, 0.74); background-color: rgba(158, 158, 158, 0.5); border: 5px solid rgb(29, 131, 8); padding: 5px;" id="time">&nbsp;</p>
<div class="pixel" id='message' style="height: 75px; width: 80px;">
    <img src="/static/msgicon.png" style="height: 50px; width: auto;;" alt="">
    <p style="color: white; font-family: Bitcount Prop Single; margin: 0;">Messages</p>
</div>
<br>
<div class="pixel" id='terminal' style="height: 88px; width: 65px;">
    <img src="/static/terminal.png" style="height: 60px; width: auto;;" alt="">
    <p style="color: white; font-family: Bitcount Prop Single; margin: 0;">Terminal</p>
</div>
<br>
<div class="pixel" id='text' style="height: 80px; width: 60px; text-align: center;">
    <img src="/static/text.png" style="height: 55px; width: auto;" alt="">
    <p style="color: white; font-family: Bitcount Prop Single; margin: 0;">Text</p>
</div>
<br>
<div class="pixel"  id='photos' style="height: 80px; width: 63px; text-align: center;">
    <img src="/static/photos.png" style="height: 55px; width: auto;" alt="">
    <p style="color: white; font-family: Bitcount Prop Single; margin: 0;">Pictures</p>
</div>
<br>
<div class="pixel" id='music' style="height: 80px; width: 60px; text-align: center;">
    <img src="/static/music.png" style="height: 55px; width: auto;" alt="">
    <p style="color: white; font-family: Bitcount Prop Single; margin: 0;">Music</p>
</div>

<p><img class="spin" id="wheel" src="/static/ying.png" style="position: absolute; right: 300px; top: 30px; height:65px; width: auto;" ></p>
</body>

<script>
    function time(){
        const now = new Date()
        document.getElementById('time').textContent = now.toLocaleTimeString()
    }
    time();
    setInterval(time, 1000)

    const photos = document.getElementById('photos')
    const music = document.getElementById('music')
    const message = document.getElementById('message')
    const termnial = document.getElementById('terminal')
    const text = document.getElementById('text')
    const home = document.getElementById('home')

    message.addEventListener('click',  ()=>{
        message.style.backgroundColor = "rgba(0, 0, 255, 0.45)"
        setTimeout(function(){
            window.location = '/challenge/1a'
        }, 850)
        setTimeout(function(){
            message.style.background = 'transparent'
        }, 1500)
    } )
    terminal.addEventListener('click',  ()=>{
        terminal.style.backgroundColor = "rgba(0, 0, 255, 0.45)"
        setTimeout(function(){
            window.location = '/home'
        }, 850)
        setTimeout(function(){
            terminal.style.background = 'transparent'
        }, 1500)
    } )
text.addEventListener('click',  ()=>{
        text.style.backgroundColor = "rgba(0, 0, 255, 0.45)"
        setTimeout(function(){
            window.location = '/home'
        }, 850)
        setTimeout(function(){
            text.style.background = 'transparent'
        }, 1500)
    } )    
music.addEventListener('click',  ()=>{
        music.style.backgroundColor = "rgba(0, 0, 255, 0.45)"
        setTimeout(function(){
            window.location = '/home'
        }, 850)
        setTimeout(function(){
            music.style.background = 'transparent'
        }, 1500)
    } )    
photos.addEventListener('click',  ()=>{
        photos.style.backgroundColor = "rgba(0, 0, 255, 0.45)"
        setTimeout(function(){
            window.location = '/home'
        }, 850)
        setTimeout(function(){
            photos.style.background = 'transparent'
        }, 1500)
    } )    
    
</script>
</html>
