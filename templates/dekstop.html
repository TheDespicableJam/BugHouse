<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    dialog{
        font-family: 'Bitcount Prop Single', monospace;
    }
    #msg:open{
        display: flex;
        flex-direction: column;
    }
    #bghcontent{
        display: flex;
        flex-direction: column;
    }
    body{
        background-image: url('/static/wall.jpg');
        background-size: cover;
        background-repeat: no-repeat;
        height: 100vh;
        overflow: hidden;
        }

    @keyframes spin {
        0%{
            transform: rotate(0deg);
        }
        100%{
            transform: rotate(360deg);
        }
    }

    .spin{
        animation: spin 2s linear infinite
    }
            
    .pixel{
        padding: 5px;
        image-rendering: crisp-edges;
        background: transparent;
        border: none;
    }

    .pixel:hover{
        background-color: rgba(240, 248, 255, 0.3);
        border: 0.08vw solid white
    }

    dialog::backdrop{
        background:none;
    }

    .toolbar {
        width: 99.8%;
        background-color: #333;
        padding: 5px;
        box-sizing: border-box;
        display: flex;
        gap: 5px;
        font-size: 17px;
        color: white
        }


    .closer {
        position: relative;
        height: 15px;
        width: 15px;
        border-radius: 50%;
        background-color: #ff5f57;

    }
    .closer:hover{
        background-color: #ff0d00;
    }



    .closey{
        height: 15px;
        width: 15px;
        border-radius: 50%;
        background-color: #febc2e;
    }

    .hostname {
        position: absolute;
        left: 50%;
        transform: translate(-50%, -88%);
    }
    
    .closing{
        color: white; 
        position: absolute; 
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 13px;
        cursor: default;
    }

    #inbox{
        font-size: 25px;
        text-align: center;
    }

    #markasread{
        color: aliceblue;
        font-family: "Bitcount Prop Single";
        font-size: 15px;
        border: 2px solid rgba(255, 255, 255, 0.63);
        background-color: #535151;
    }
    #markasread:hover{
        box-shadow: 0px 2px 5px black;
    }


    #showmsg{
        background-color: transparent;
        border: none;
        color: aliceblue;
        font-family: "Bitcount Prop Single";
        font-size: 18px;
    }

    #showmsg:hover{
        text-decoration: underline;
    }
    
    #msgcon li::marker{
        content: "\27A2";
    }

    #jacklink{
        padding: 0;
        font-family: "Bitcount Prop Single";
        font-size: 20px;
        background: transparent;
        border: none;
        text-decoration: underline;
        color: rgb(19, 19, 129);
    }

    #jacklink:hover{
        color: rgb(235, 62, 62);
    }
</style>
</head>



<body>

<!--messages app-->
<dialog style=" outline: none; border: 0;padding: 0px; height: 85vh; width: 70vw; background-color: rgb(80, 88, 97);" id="msg">
    <div style="display: flex;" class="toolbar">
    <div id="cross" class="closer">
        <div class="closing">x</div>
    </div>
    <div class="closey"></div>
    <p class="hostname">Messages</p>
    </div>
    <div id="content" style=" font-size: 17px; padding: 25px; color: aliceblue; flex: 1; position: relative;">
        <div id="inbox">Inbox</div><br>
            <div id="msgcon" style="font-size: 20px;">
            </div> 
    </div>
</dialog>



<img id="wheel" class="spin" src="/static/ying.png" style="position: absolute; right: 18vw; top: 4vh; height:8vh; width: auto;" >

</body>

<script>

    function time(){
        const now = new Date()
        document.getElementById('time').textContent = now.toLocaleTimeString()
    }
    time();
    setInterval(time, 1000)
    
    const photos = document.getElementById('photos')
    const music = document.getElementById('music')
    const message = document.getElementById('message')
    const terminal = document.getElementById('terminal')
    const text = document.getElementById('text')
    const msg = document.getElementById('msg')  
    const ads = [
        {
        title: "Get FREE RAM!!!",
        body: "Call us on this number 1800-G3T-SC4MM3D and tell us you credit card number(for verification, obviously) and download 64GB of FREE RAM!!!"
        },
        {
        title: "HOT SINGLES IN YOUR AREA",
        body: "Looking for fun times?... <br>They are definitely real and not bots."
        },
        {
        title: "YOU'VE BEEN SELECTED FOR THE BETA DEVELOPERS ONLY IPHONE 20 TESTING!!!",
        body: "Click absolutely no where to claim your prize."
        },
        {
        title: "FREE MINECRAFT?!?!!",
        body: "Download this very real software to GET MINCERAFT FOR ABSOLUTELY FREE!!!"
        },
        {
        title: "GTA 6 FREE DOWNLOAD?!??!!",
        body: "I can't even make a joke about this one... maybe in another life..."
        }
        ];

    let lastCleared = Number(localStorage.getItem('lastCleared'));
    if(!lastCleared){
        lastCleared = Date.now();
        localStorage.setItem('lastCleared', lastCleared)
    }
    let adWaiting = false;
    let currentAd = null;

    function showMsg(){
        document.getElementById('messages').style.display="block"
        document.getElementById('showmsg').style.display='none'
    }

    function checkForAd(){
    if(adWaiting){return;}
    const elapsed = Date.now() - lastCleared;
    const showAD = 10 * 1000;

    if(elapsed >= showAD){
        const randomIndex = Math.floor(Math.random() * ads.length);
        currentAd = ads[randomIndex];
        adWaiting = true;
        document.getElementById('msgicon').src = "/static/msgicon_unread.png" 
        }
    }   

    setInterval(checkForAd, 5000);
    checkForAd()

    function clearAd(){
        adWaiting = false;
        currentAd = null;
        document.getElementById('msgicon').src = "/static/msgicon.png" 
        lastCleared = Date.now()
        localStorage.setItem('lastCleared', lastCleared);
        document.getElementById('msgcon').innerHTML = "<p style='font-size:25px; margin:0;'>All Caught Up</p><p>No New Messages</p>";
    }

    function hideMsg(){
        msg.close()
        document.getElementById('messages').style.display="none"
        document.getElementById('showmsg').style.display="block"
    }

    document.getElementById('cross').addEventListener('click', hideMsg)
     

    message.addEventListener('click',  ()=>{
        message.style.backgroundColor = "rgba(0, 0, 255, 0.45)"
        setTimeout(function(){
            msg.showModal()
            fetch('/messages')
                .then(res => res.text())
                .then(reply =>{
                    if (reply != "not completed"){
                        document.getElementById('msgcon').innerHTML = ""
                        document.getElementById('msgcon').innerHTML += reply
                    }
                    else{
                        checkForAd();
                        document.getElementById('msgcon').innerHTML = "";
                        if(adWaiting){
                            document.getElementById('msgcon').innerHTML = 
                            `<p style="font-size:20px; margin: 0; ">You Have New Message(s)<p>
                            <ul style="padding:0; margin: 5px;">
                                <li>
                                    <button id="showmsg" onclick="showMsg()" style="border:none;">
                                        ${currentAd.title}
                                    </button>
                                </li>
                            </ul>
                            <div id="messages" style="position:absolute; display:none; inset:0; padding:20px; background-color:rgb(80,88,97);">
                                <div>
                                    ${currentAd.body}<br><br>
                                    <button id="markasread" onclick="
                                        document.getElementById('messages').style.display='none';
                                        document.getElementById('showmsg').style.display='block';
                                        clearAd();">Mark As Read</button>
                                </div>
                            </div>`;
                        }
                            else{
                                document.getElementById('msgcon').innerHTML =
                                "<p style='font-size:25px; margin:0;'>All Caught Up</p><p>No New Messages</p>";
                            }
                        }
                })
        }, 850)

        setTimeout(function(){
            message.style.removeProperty('background')
        }, 950)
    } )

    terminal.addEventListener('click',  ()=>{
        terminal.style.backgroundColor = "rgba(0, 0, 255, 0.45)"

        setTimeout(function(){
            window.location = '/home'
        }, 850)

        setTimeout(function(){
            terminal.style.background = 'transparent'
        }, 1500)
    } )

text.addEventListener('click',  ()=>{

        text.style.backgroundColor = "rgba(0, 0, 255, 0.45)"

        setTimeout(function(){
            window.location = '/home'
        }, 850)

        setTimeout(function(){
            text.style.background = 'transparent'
        }, 1500)
    } )    

music.addEventListener('click',  ()=>{

        music.style.backgroundColor = "rgba(0, 0, 255, 0.45)"

        setTimeout(function(){
            window.location = '/opwuetcbalehqo109dhbw154mnbah4l8641hn5j2ks6lrpcm69q65.onion'
        }, 850)

        setTimeout(function(){
            music.style.background = 'transparent'
        }, 1500)
    } )    

photos.addEventListener('click',  ()=>{

        photos.style.backgroundColor = "rgba(0, 0, 255, 0.45)"

        setTimeout(function(){
            window.location = '/ghidra'
        }, 850)

        setTimeout(function(){
            photos.style.background = 'transparent'
        }, 1500)
    } )    
    
</script>

<script>
    const bughouseapp = document.getElementById('bughouse')
    const crossbgh = document.getElementById('crossbgh')
    const bgh = document.getElementById('bgh')
    const content = document.getElementById('bghcontent')

    function failstart(){
            bgh.showModal()
            bgh.style.backgroundColor='black'
            content.style.height='80%'
            content.style.justifyContent='center'
            content.style.alignItems='center'
            content.style.color='White'
            content.innerHTML='Loading...'
            
            setTimeout(function(){
                content.style.justifyContent=''
                content.style.alignItems=''
                content.style.color=''
                bgh.style.backgroundColor='rgb(0, 48, 204)'
                document.getElementById('bghcontent').innerHTML='<p style="text-align: center; color:rgb(219, 15, 15)">Runtime Error</p> <br><p style="color: white; font-size: 13px; line-height: 30px;">Failed Integrity Check<br>Error Code 0x4011B2</p>'
            }, 3000 )

    }



     bughouseapp.addEventListener('click',  ()=>{
        bughouseapp.style.backgroundColor = "rgba(0, 0, 255, 0.45)"

        setTimeout(function(){
            
            failstart()
        }, 850)

        setTimeout(function(){
            bughouseapp.style.background = 'transparent'
        }, 950)
    } )

    crossbgh.addEventListener('click', ()=>{
        bgh.close()
    })



</script>

</html>
