<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>BugHouse</title>
    
<style>
    .toolbar {
        width: 100%;
        background-color: #333;
        padding: 5px;
        box-sizing: border-box;
        display: flex;
        gap: 5px;
        font-size: 17px;
        color: aliceblue;
        }


    .closer {
        height: 15px;
        width: 15px;
        border-radius: 50%;
        position: relative;
        background-color: #ff5f57;
    }
    .closer:hover{
        background-color: #ff0d00;
    }



    .closey{
        height: 15px;
        width: 15px;
        border-radius: 50%;
        background-color: #febc2e;
    }

    .hostname {margin: auto;}

    .closing{
        color: white; 
        position: absolute; 
        top: 50%; left:50%; 
        transform: translate(-50%, -50%);
        font-size: 13px;
        cursor: default
    }
    .cli{
        border: none;
        background: transparent;
        outline: none;
        width: 90%;
    }
    .msg{
        font-family: 'Bitcount Prop Single', monospace;
        color: white;
    }


    .apple{
        color: #ff5555
    }

    .player{
        color: #5555ff
    }


    #scroll::-webkit-scrollbar{
        display: none;
    }

    /* animations? */
    .fade {
    animation: fade 1s linear infinite;
    }
    @keyframes fade {
    50% {
        opacity: 0;
    }
    }

    @keyframes fade-out {
    0% {opacity: 1;}
    100%{opacity: 0;}
    }

    @font-face{
        font-family: 'Pixelta';
        src: url('/static/Pixelta.ttf');
        }


    body {
        background-color: rgb(32, 32, 32);
        color: #31ff31;
        font-family: 'Bitcount Prop Single', monospace;
        font-size: 20px;
    }

    input {
    background-color: black;
    color: #31ff31;
    border: 2px solid #626862;
    font-family: 'Bitcount Prop Single', monospace;
    font-size: 18px;
    } 

    button {
    background-color: rgb(41, 38, 38);
    color: #43ff4c;
    border: 2px solid #626862;
    font-family: 'Bitcount Prop Single', monospace;
    font-size: 18px;
    }

    button:hover{
        background-color: rgba(66, 62, 62);   
    }
</style>
</head>
<body>
<div>
    <div class="toolbar">
    <div id="cross" class="closer">
        <div class="closing">x</div>
    </div>
    <div class="closey"></div>
    <p class="hostname">root@kali</p>
</div>
    {% block content %}
    {% endblock %}
<script>
    document.getElementById('cross').addEventListener('click', ()=>{
        window.location ='/'})
</script>
    
</body>
</html>
