{% extends 'base.html' %}
{% block content %}

<style>
    #error{
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 50px;
    }
    #back{
        margin-top: 20px;
        display: flex;
        justify-content: center;
    }
</style>

<div id="error">
    {% if err == 'notfound' %}
    Error 404! <br>
    Page Not Found
    {% elif err == 'method' %}
    Error 405! <br>
    Method Not Allowed
    {% endif %}
</div>
<div id="back">
    <button onclick="window.location='/home'">Go Back?</button>
</div>

{% endblock %}
